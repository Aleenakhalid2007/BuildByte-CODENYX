<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment - SkillAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">SkillAI</a>
    </div>
</nav>

<section class="quiz-section">
    <div class="container">
        <div class="quiz-card">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>{{ skill | capitalize }} Assessment</h2>
                <span class="badge bg-primary p-2" id="questionCounter">Question 1 of {{ questions | length }}</span>
            </div>

            <div class="progress mb-4">
                <div class="progress-bar" id="progressBar" style="width:0%">0%</div>
            </div>

            <form id="quizForm" method="POST" action="/result">

                <input type="hidden" name="skill" value="{{ skill }}">

                {% for q in questions %}
                <div class="quiz-question {% if not loop.first %}d-none{% endif %}" data-question="{{ loop.index }}">

                    <span class="badge bg-secondary mb-2">{{ q.difficulty | capitalize }}</span>
                    <h4 class="mb-4">{{ q.question }}</h4>

                    {% if q.type == "mcq" %}
                        {% for opt in q.options %}
                        <div class="form-check quiz-option" onclick="selectOption(this)">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="{{ opt }}" id="opt-{{ q.id }}-{{ loop.index }}">
                            <label class="form-check-label" for="opt-{{ q.id }}-{{ loop.index }}">{{ opt }}</label>
                        </div>
                        {% endfor %}
                    {% else %}
                        <textarea class="form-control" name="{{ q.id }}" rows="4" placeholder="Type your answer..."></textarea>
                    {% endif %}

                </div>
                {% endfor %}

                <div class="d-flex justify-content-between mt-5">
                    <button type="button" class="btn btn-secondary" id="prevBtn" disabled>Previous</button>
                    <button type="button" class="btn quiz-btn" id="nextBtn">Next</button>
                </div>

            </form>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentQuestion = 1;
    const totalQuestions = {{ questions | length }};

    const questionCounter = document.getElementById("questionCounter");
    const progressBar = document.getElementById("progressBar");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function showQuestion(num) {
        document.querySelectorAll(".quiz-question").forEach(q => q.classList.add("d-none"));
        document.querySelector(`.quiz-question[data-question="${num}"]`).classList.remove("d-none");

        questionCounter.textContent = `Question ${num} of ${totalQuestions}`;
        const percent = (num / totalQuestions) * 100;
        progressBar.style.width = percent + "%";
        progressBar.textContent = Math.round(percent) + "%";

        prevBtn.disabled = num === 1;
        nextBtn.textContent = num === totalQuestions ? "Submit" : "Next";
    }

    function selectOption(div) {
        const parent = div.closest(".quiz-question");
        parent.querySelectorAll(".quiz-option").forEach(opt => opt.classList.remove("selected"));

        div.classList.add("selected");

        const radio = div.querySelector("input[type=radio]");
        radio.checked = true;
    }

    nextBtn.addEventListener("click", () => {
        if (currentQuestion < totalQuestions) {
            currentQuestion++;
            showQuestion(currentQuestion);
        } else {
            document.getElementById("quizForm").submit();
        }
    });

    prevBtn.addEventListener("click", () => {
        if (currentQuestion > 1) {
            currentQuestion--;
            showQuestion(currentQuestion);
        }
    });

    showQuestion(1);
</script>

</body>
</html>
