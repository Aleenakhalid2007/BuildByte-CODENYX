<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile - SkillAI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            SkillAI
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/profile">Profile</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/challenge">Assessment</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/">Logout</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= PROFILE SECTION ================= -->

<section class="profile-section">

    <div class="container">

        <div class="profile-card">

            <h2 class="text-center mb-4">
                Complete Your Profile
            </h2>

            <form method="POST" action="/profile">

                <!-- ================= PERSONAL INFORMATION ================= -->

                <h4 class="section-title">
                    Personal Information
                </h4>

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control profile-input"
                        placeholder="Enter your full name"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control profile-input"
                        placeholder="Enter your email"
                        required>

                </div>

                <!-- ================= BIO ================= -->

                <h4 class="section-title">
                    About You
                </h4>

                <div class="mb-4">

                    <label class="form-label">
                        Short Bio
                    </label>

                    <textarea
                        name="bio"
                        class="form-control profile-input"
                        rows="4"
                        placeholder="Tell recruiters about yourself..."
                        required></textarea>

                </div>

                <!-- ================= SKILLS ================= -->

               

<h4 class="section-title">
    Skills
</h4>

<div class="mb-4">

    <label class="form-label">
        Select up to 3 skills you want to be assessed on
    </label>

    <div class="skill-checkbox-group">

        <div class="form-check quiz-option">
            <input class="form-check-input skill-checkbox" type="checkbox" name="skills" value="graphic design" id="skill-design">
            <label class="form-check-label" for="skill-design">Graphic Design</label>
        </div>

        <div class="form-check quiz-option">
            <input class="form-check-input skill-checkbox" type="checkbox" name="skills" value="software engineering" id="skill-swe">
            <label class="form-check-label" for="skill-swe">Software Engineering</label>
        </div>

        <div class="form-check quiz-option">
            <input class="form-check-input skill-checkbox" type="checkbox" name="skills" value="teaching" id="skill-teaching">
            <label class="form-check-label" for="skill-teaching">Teaching</label>
        </div>

        <small class="text-muted d-block mt-2" id="skillLimitMsg"></small>

    </div>

</div>
                <!-- ================= PORTFOLIO ================= -->

                <h4 class="section-title">
                    Portfolio Links
                </h4>

                <div class="mb-3">

                    <label class="form-label">
                        GitHub Profile
                    </label>

                    <input
                        type="url"
                        name="github"
                        class="form-control profile-input"
                        placeholder="https://github.com/username">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        LinkedIn Profile
                    </label>

                    <input
                        type="url"
                        name="linkedin"
                        class="form-control profile-input"
                        placeholder="https://linkedin.com/in/username">

                </div>

                <!-- ================= PROJECT ================= -->

                <h4 class="section-title">
                    Featured Project
                </h4>

                <div class="mb-3">

                    <label class="form-label">
                        Project Name
                    </label>

                    <input
                        type="text"
                        name="project_name"
                        class="form-control profile-input"
                        placeholder="Smart Attendance System"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Project Description
                    </label>

                    <textarea
                        name="project_description"
                        class="form-control profile-input"
                        rows="4"
                        placeholder="Describe your project..."
                        required></textarea>

                </div>

                <!-- ================= BUTTON ================= -->

                <div class="text-center">

                    <button
                        type="submit"
                        class="btn profile-btn">

                        Save Profile

                    </button>

                </div>

            </form>

        </div>

    </div>

</section>

<!-- Bootstrap JS -->

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const checkboxes = document.querySelectorAll(".skill-checkbox");
    const limitMsg = document.getElementById("skillLimitMsg");

    checkboxes.forEach(function (cb) {
        cb.addEventListener("change", function () {
            const checkedCount = document.querySelectorAll(".skill-checkbox:checked").length;

            if (checkedCount >= 3) {
                checkboxes.forEach(function (box) {
                    if (!box.checked) {
                        box.disabled = true;
                    }
                });
                limitMsg.textContent = "Maximum 3 skills selected.";
            } else {
                checkboxes.forEach(function (box) {
                    box.disabled = false;
                });
                limitMsg.textContent = "";
            }
        });
    });
</script>

</body>

</html>
